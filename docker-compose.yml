services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - app-net

  worker:
    build: .
    command: celery -A inventario_cloud worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge